<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Travel Point - HUD</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone-frame">
    <main class="app-container">
      
      <section class="screen active" id="inicio">
        <header class="top-bar">
          <h1>🎮 Travel Point</h1>
          <p class="subtitle">Guía de Usuario</p>
        </header>
        <article class="hero-card">
          <h2>Tutorial de Inicio</h2>
          <ol class="tutorial-list">
            <li><a href="#">Explorar el Radar</a></li>
            <li><a href="#">Guardar Checkpoints</a></li>
          </ol>
        </article>
        <nav class="menu-buttons">
          <button onclick="showScreen('mapa')">🗺️ Ver mapa</button>
          <button onclick="showScreen('historial')">📜 Mis viajes</button>
          <button onclick="showScreen('registro')">➕ Nuevo checkpoint</button>
        </nav>
      </section>

      <section class="screen" id="mapa">
        <header class="top-bar">
          <h1>🗺️ Radar de Ruta</h1>
        </header>
        <div class="hero-card">
          <p>[ Mapa Cargando... ]</p>
          <div style="height: 200px; background: #1e293b; border: 1px dashed #22d3ee; margin-top: 10px;"></div>
        </div>
        <nav class="menu-buttons">
          <button onclick="showScreen('inicio')">🏠 Volver al Menú</button>
        </nav>
      </section>

      <section class="screen" id="registro">
        <header class="top-bar">
          <h1>➕ Nuevo Checkpoint</h1>
        </header>
        <form class="form-card">
          <input type="text" placeholder="Lugar visitado" required />
          <input type="text" placeholder="Vehículo" required />
          <div class="menu-buttons">
            <button type="button" class="save-btn" onclick="activarLog()">💾 Guardar Punto</button>
            <button type="button" onclick="showScreen('inicio')">❌ Cancelar</button>
          </div>
        </form>
      </section>

      <section class="screen" id="historial">
        <header class="top-bar">
          <h1>📜 Bitácora</h1>
        </header>
        <div class="travel-list">
          <article class="travel-card">
            <div class="travel-thumb">🏍️</div>
            <div class="travel-info">
              <h3>Punto de Reaparición: Guatavita</h3>
              <p>Estado: Guardado en DB</p>
            </div>
          </article>
        </div>
        <nav class="menu-buttons">
          <button onclick="showScreen('inicio')">🏠 Inicio</button>
        </nav>
      </section>

    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
